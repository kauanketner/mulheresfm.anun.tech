name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mulheresfm:latest
            ghcr.io/${{ github.repository_owner }}/mulheresfm:${{ github.sha }}

      - name: Deploy no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: root
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            DOMAIN="mulheresfm.anun.tech"

            echo "=== Containers em execução ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Ports}}"

            echo "=== Tentando sitectl deploy ==="
            if command -v sitectl &> /dev/null; then
              sitectl deploy --domain "$DOMAIN"
              echo "sitectl deploy concluído"
            else
              echo "sitectl não encontrado, buscando em paths comuns..."
              for p in /usr/local/bin/sitectl /usr/bin/sitectl ~/bin/sitectl; do
                if [ -x "$p" ]; then
                  "$p" deploy --domain "$DOMAIN"
                  echo "Deploy via $p concluído"
                  exit 0
                fi
              done

              echo "sitectl não encontrado. Fazendo deploy direto via Docker..."
              IMAGE="ghcr.io/${{ github.repository_owner }}/mulheresfm:latest"
              DATA_DIR="/data/mulheresfm"
              mkdir -p "$DATA_DIR/uploads"

              echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
              docker pull "$IMAGE"

              # Para qualquer container usando porta 3000
              docker ps -q --filter "publish=3000" | xargs -r docker stop || true
              docker ps -aq --filter "publish=3000" | xargs -r docker rm || true
              docker stop mulheresfm 2>/dev/null || true
              docker rm   mulheresfm 2>/dev/null || true

              docker run -d \
                --name mulheresfm \
                --restart unless-stopped \
                -p 3000:3000 \
                -v "$DATA_DIR:/data" \
                -e DATA_DIR=/data \
                -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
                -e NODE_ENV=production \
                "$IMAGE"

              docker image prune -f
            fi

            echo "=== Containers após deploy ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Ports}}"
