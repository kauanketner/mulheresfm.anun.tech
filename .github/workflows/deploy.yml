name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mulheresfm:latest
            ghcr.io/${{ github.repository_owner }}/mulheresfm:${{ github.sha }}

      - name: Deploy no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: root
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            IMAGE="ghcr.io/${{ github.repository_owner }}/mulheresfm:latest"
            CONTAINER="mulheresfm"
            DATA_DIR="/data/mulheresfm"

            # Login no registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Garante volume de dados persistente
            mkdir -p "$DATA_DIR/uploads"

            # Para e remove QUALQUER container usando porta 3000 (independente do nome)
            docker ps -q --filter "publish=3000" | xargs -r docker stop
            docker ps -aq --filter "publish=3000" | xargs -r docker rm

            # Remove container pelo nome também (caso não use porta fixa)
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm   "$CONTAINER" 2>/dev/null || true

            # Puxa e sobe com nova imagem
            docker pull "$IMAGE"
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 3000:3000 \
              -v "$DATA_DIR:/data" \
              -e DATA_DIR=/data \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              -e NODE_ENV=production \
              "$IMAGE"

            # Limpeza
            docker image prune -f
            echo "Deploy concluído com sucesso!"
